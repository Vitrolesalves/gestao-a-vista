<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro interno - Gestão à Vista</title>
    <style>
        body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;color:#334155}
        .container{text-align:center;padding:2rem}
        .code{font-size:6rem;font-weight:700;color:#1e293b;margin:0;line-height:1}
        .title{font-size:1.5rem;font-weight:600;color:#475569;margin:1rem 0 0.5rem}
        .message{font-size:1rem;color:#64748b;margin-bottom:2rem}
        .btn{display:inline-block;padding:0.75rem 1.5rem;background:#1e293b;color:#fff;text-decoration:none;border-radius:0.375rem;font-size:0.875rem;font-weight:500;transition:opacity 0.2s}
        .btn:hover{opacity:0.9}
    </style>
</head>
<body>
    <div class="container">
        <p class="code">500</p>
        <h1 class="title">Erro interno do servidor</h1>
        <p class="message">Ocorreu um erro inesperado. Tente novamente mais tarde.</p>
        <a href="/" class="btn">Voltar para o início</a>
    </div>
</body>
</html>
