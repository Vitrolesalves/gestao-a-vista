{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Acesso - Gestão à Vista</title>
    <style>
        body {
            margin: 0;
            font-family: ui-sans-serif, system-ui, sans-serif;
            background: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh
        }

        .container {
            width: 100%;
            max-width: 28rem;
            padding: 2rem
        }

        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1)
        }

        .input {
            width: 100%;
            padding: 0.5rem;
            margin-bottom: 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.375rem;
            box-sizing: border-box;
        }

        label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 0.25rem;
            font-weight: bold
        }
    </style>
</head>

<body>
    <div class="container">
        <h2 style="text-align:center;">Solicitar Acesso</h2>

        {% if messages %}
        {% for message in messages %}
        <div
            style="padding:1rem; margin-bottom:1rem; border-radius:0.25rem; background-color:{% if message.tags == 'error' %}#fee2e2;color:#991b1b{% else %}#dcfce7;color:#166534{% endif %};">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <div class="form-container">
            <form method="POST">
                {% csrf_token %}
                <label>Nome Completo</label>
                <input type="text" name="nome" class="input" required>

                <label>E-mail</label>
                <input type="email" name="email" class="input" required>

                <label>Número de Telefone</label>
                <input type="text" name="telefone" class="input" required>

                <label>Regional / Unidade</label>
                <select name="regional" class="input" required>
                    <option value="" disabled selected>Selecione sua regional</option>
                    {% for reg in regionais %}
                    <option value="{{ reg.id }}">{{ reg.nome }}</option>
                    {% endfor %}
                </select>

                <label>Senha</label>
                <input type="password" name="senha" class="input" required>

                <button type="submit"
                    style="width:100%;background:#000c25;color:white;padding:0.75rem;border-radius:0.375rem;border:none;cursor:pointer;font-weight:bold">Enviar
                    Solicitação</button>
            </form>
            <div style="text-align:center; margin-top:1rem;">
                <a href="{% url 'gestao_a_vista:login' %}" style="color:#6b7280; font-size:0.875rem;">Voltar para o
                    Login</a>
            </div>
        </div>
    </div>
</body>

</html>
