input {
  # Logs do Django
  file {
    path => "/logs/django.json"
    start_position => "beginning"
    codec => "json"
    type => "django"
    tags => ["django", "application"]
  }
  
  # Logs de segurança
  file {
    path => "/logs/security.log"
    start_position => "beginning"
    type => "security"
    tags => ["security", "django"]
  }
  
  # Logs de auditoria
  file {
    path => "/logs/audit.log"
    start_position => "beginning"
    type => "audit"
    tags => ["audit", "django"]
  }
  
  # Logs de performance
  file {
    path => "/logs/performance.log"
    start_position => "beginning"
    codec => "json"
    type => "performance"
    tags => ["performance", "django"]
  }
  
  # Logs do Nginx
  file {
    path => "/logs/nginx/access.log"
    start_position => "beginning"
    type => "nginx_access"
    tags => ["nginx", "access"]
  }
  
  file {
    path => "/logs/nginx/error.log"
    start_position => "beginning"
    type => "nginx_error"
    tags => ["nginx", "error"]
  }
  
  # Logs do PostgreSQL
  file {
    path => "/logs/postgresql/*.log"
    start_position => "beginning"
    type => "postgresql"
    tags => ["postgresql", "database"]
  }
  
  # Logs do Celery
  file {
    path => "/logs/celery.log"
    start_position => "beginning"
    type => "celery"
    tags => ["celery", "worker"]
  }
}

filter {
  # Filtro para logs do Django
  if [type] == "django" {
    # Adicionar campos estruturados
    mutate {
      add_field => { "service" => "gestao-a-vista" }
      add_field => { "environment" => "${ENVIRONMENT:development}" }
    }
    
    # Parsear timestamp
    date {
      match => [ "asctime", "yyyy-MM-dd HH:mm:ss,SSS" ]
      target => "@timestamp"
    }
    
    # Extrair informações do usuário se disponível
    if [user] and [user] != "anonymous" {
      mutate {
        add_field => { "user_id" => "%{user}" }
      }
    }
    
    # Classificar por nível de log
    if [levelname] == "ERROR" or [levelname] == "CRITICAL" {
      mutate {
        add_tag => ["error"]
        add_field => { "alert_level" => "high" }
      }
    } else if [levelname] == "WARNING" {
      mutate {
        add_tag => ["warning"]
        add_field => { "alert_level" => "medium" }
      }
    }
  }
  
  # Filtro para logs de segurança
  if [type] == "security" {
    grok {
      match => { 
        "message" => "SECURITY %{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:module} %{GREEDYDATA:security_message}"
      }
    }
    
    mutate {
      add_tag => ["security_event"]
      add_field => { "alert_level" => "high" }
    }
    
    # Extrair IP se presente
    grok {
      match => { "security_message" => ".*IP[:\s]+(?<client_ip>\d+\.\d+\.\d+\.\d+)" }
      tag_on_failure => []
    }
    
    # Classificar tipos de eventos de segurança
    if "login" in [security_message] {
      mutate { add_tag => ["authentication"] }
    } else if "permission" in [security_message] or "forbidden" in [security_message] {
      mutate { add_tag => ["authorization"] }
    } else if "suspicious" in [security_message] or "attack" in [security_message] {
      mutate { add_tag => ["threat"] }
    }
  }
  
  # Filtro para logs de auditoria
  if [type] == "audit" {
    grok {
      match => { 
        "message" => "AUDIT %{TIMESTAMP_ISO8601:timestamp} %{DATA:user} %{DATA:action} %{DATA:resource} %{DATA:result} %{GREEDYDATA:audit_message}"
      }
    }
    
    mutate {
      add_tag => ["audit_trail"]
      add_field => { "compliance" => "true" }
    }
    
    # Classificar ações críticas
    if [action] in ["delete", "remove", "drop"] {
      mutate {
        add_tag => ["critical_action"]
        add_field => { "alert_level" => "high" }
      }
    }
  }
  
  # Filtro para logs do Nginx
  if [type] == "nginx_access" {
    grok {
      match => { 
        "message" => "%{NGINXACCESS}"
      }
    }
    
    # Converter campos numéricos
    mutate {
      convert => { "response" => "integer" }
      convert => { "bytes" => "integer" }
      convert => { "responsetime" => "float" }
    }
    
    # Classificar por código de status
    if [response] >= 500 {
      mutate {
        add_tag => ["server_error"]
        add_field => { "alert_level" => "high" }
      }
    } else if [response] >= 400 {
      mutate {
        add_tag => ["client_error"]
        add_field => { "alert_level" => "medium" }
      }
    }
    
    # Detectar ataques comuns
    if [request] =~ /(\.\./|union|select|script|alert)/ {
      mutate {
        add_tag => ["potential_attack"]
        add_field => { "alert_level" => "high" }
      }
    }
  }
  
  # Filtro para logs de performance
  if [type] == "performance" {
    # Converter duração para número
    mutate {
      convert => { "duration" => "float" }
    }
    
    # Classificar performance
    if [duration] > 5000 {
      mutate {
        add_tag => ["very_slow"]
        add_field => { "alert_level" => "high" }
      }
    } else if [duration] > 2000 {
      mutate {
        add_tag => ["slow"]
        add_field => { "alert_level" => "medium" }
      }
    }
  }
  
  # Filtro para logs do PostgreSQL
  if [type] == "postgresql" {
    grok {
      match => { 
        "message" => "%{TIMESTAMP_ISO8601:timestamp} \[%{DATA:pid}\] %{DATA:user}@%{DATA:database} %{LOGLEVEL:level}: %{GREEDYDATA:pg_message}"
      }
    }
    
    # Detectar queries lentas
    if "duration:" in [pg_message] {
      grok {
        match => { "pg_message" => ".*duration: %{NUMBER:query_duration:float} ms" }
      }
      
      if [query_duration] > 1000 {
        mutate {
          add_tag => ["slow_query"]
          add_field => { "alert_level" => "medium" }
        }
      }
    }
    
    # Detectar erros de conexão
    if "connection" in [pg_message] and ("refused" in [pg_message] or "timeout" in [pg_message]) {
      mutate {
        add_tag => ["connection_error"]
        add_field => { "alert_level" => "high" }
      }
    }
  }
  
  # Enriquecer com geolocalização (se IP disponível)
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
  
  # Adicionar timestamp de processamento
  mutate {
    add_field => { "processed_at" => "%{@timestamp}" }
  }
  
  # Remover campos desnecessários
  mutate {
    remove_field => [ "host", "path" ]
  }
}

output {
  # Enviar para Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "gestao-a-vista-%{+YYYY.MM.dd}"
    
    # Template para mapeamento
    template_name => "gestao-a-vista"
    template => "/usr/share/logstash/templates/gestao-a-vista-template.json"
    template_overwrite => true
  }
  
  # Output para debug (apenas em desenvolvimento)
  if "${ENVIRONMENT:development}" == "development" {
    stdout {
      codec => rubydebug
    }
  }
  
  # Alertas para eventos críticos
  if "error" in [tags] or "security_event" in [tags] or [alert_level] == "high" {
    # Webhook para alertas (configurar URL real)
    http {
      url => "${ALERT_WEBHOOK_URL:http://localhost:9093/api/v1/alerts}"
      http_method => "post"
      format => "json"
      mapping => {
        "alert_type" => "%{type}"
        "level" => "%{alert_level}"
        "message" => "%{message}"
        "timestamp" => "%{@timestamp}"
        "service" => "gestao-a-vista"
        "tags" => "%{tags}"
      }
    }
  }
}
