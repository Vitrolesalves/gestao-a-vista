{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="min-h-screen bg-slate-50 p-6">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-lg shadow-md p-6">
            <div class="text-center">
                <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
                    <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                    </svg>
                </div>
                
                <h3 class="text-lg font-medium text-slate-900 mb-2">Confirmar Exclusão</h3>
                
                <p class="text-sm text-slate-500 mb-6">
                    Tem certeza que deseja excluir a sala "<strong>{{ object.nome }}</strong>"? 
                    Esta ação não pode ser desfeita.
                </p>

                <form method="post" class="flex gap-3">
                    {% csrf_token %}
                    <button type="submit" 
                            class="flex-1 bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-500">
                        Excluir
                    </button>
                    <a href="{% url 'gestao_a_vista:gestao_salas' %}" 
                       class="flex-1 bg-gray-500 text-white py-2 px-4 rounded-md text-center hover:bg-gray-600 focus:outline-none focus:ring-2 focus:ring-gray-500">
                        Cancelar
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
