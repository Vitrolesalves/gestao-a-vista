<div style="font-family: Arial, sans-serif; padding: 20px; color: #333; max-width: 600px; border: 1px solid #e2e8f0; border-radius: 8px;">
    <h2 style="color: #b91c1c; border-bottom: 2px solid #b91c1c; padding-bottom: 10px;">⚠️ Livro Ata não preenchido</h2>

    <p>O turno abaixo foi encerrado sem nenhum registro no Livro Ata. Verifique com o responsável pelo posto.</p>

    <table style="border-collapse: collapse; width: 100%; margin-top: 15px;">
        <tr style="background-color: #f1f5f9; border: 1px solid #dee2e6;">
            <td style="padding: 12px; font-weight: bold; width: 35%;">CR:</td>
            <td style="padding: 12px;">{{ cr_nome }}</td>
        </tr>
        <tr style="border: 1px solid #dee2e6;">
            <td style="padding: 12px; font-weight: bold;">Turno:</td>
            <td style="padding: 12px; color: #b91c1c; font-weight: bold;">{{ turno }}</td>
        </tr>
        <tr style="background-color: #f1f5f9; border: 1px solid #dee2e6;">
            <td style="padding: 12px; font-weight: bold;">Período:</td>
            <td style="padding: 12px;">{{ inicio }} - {{ fim }}</td>
        </tr>
    </table>

    <div style="margin-top: 30px; text-align: center; padding-top: 15px; border-top: 1px solid #e2e8f0; font-size: 12px; color: #64748b;">
        Este é um e-mail automático gerado pelo sistema de Gestão à Vista.
    </div>
</div>
