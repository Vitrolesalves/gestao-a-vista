{% if dashboards %}
<div class="dashboard-grid" id="dashboard-grid">
    {% for dashboard in dashboards %}
    <div class="bg-white border rounded-lg p-4 hover:shadow-md transition-shadow flex flex-col h-full">
        <!-- Cabeçalho do Card -->
        <div class="flex justify-between items-start">
            <div class="flex-1">
                <h3 class="text-lg font-semibold text-slate-900 mb-2">{{ dashboard.nome }}</h3>
                <div class="text-sm text-slate-600">
                    <span class="font-medium">Cliente:</span>
                    {{ dashboard.cliente }}
                </div>
            </div>
            <span class="px-2 py-1 text-xs font-medium rounded-full bg-blue-50 text-blue-700 ml-2 flex-shrink-0">
                {{ dashboard.servico }}
            </span>
        </div>

        <!-- Data de Criação -->
        <div class="text-xs text-slate-500 flex items-center mt-3">
            <svg class="h-3 w-3 mr-1 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            Criado em {{ dashboard.created_at|date:"d/m/Y \à\s H:i" }}
        </div>

        <!-- Botões - Sempre no final do card -->
        <div class="flex gap-2 mt-auto pt-4">
            <button type="button" data-action="view" data-dashboard-id="{{ dashboard.id }}"
                    class="flex-1 inline-flex items-center justify-center px-3 py-2 border border-transparent text-sm font-medium rounded-md text-white hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-500 transition-colors"
                    style="background-color: #0F172A;">
                <svg class="h-4 w-4 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                Visualizar
            </button>
            <button type="button" data-action="edit" data-dashboard-id="{{ dashboard.id }}"
                    class="flex-shrink-0 w-10 h-10 inline-flex items-center justify-center border border-gray-300 text-sm font-medium rounded-md text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 transition-colors">
                <svg class="h-4 w-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                </svg>
            </button>
            <button type="button" data-action="delete" data-dashboard-id="{{ dashboard.id }}"
                    class="flex-shrink-0 w-10 h-10 inline-flex items-center justify-center border border-red-300 text-sm font-medium rounded-md text-red-700 hover:bg-red-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors">
                <svg class="h-4 w-4 flex-shrink-0 text-red-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="text-center py-12" id="dashboard-grid">
    <svg class="mx-auto h-12 w-12 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
    </svg>
    <p class="mt-2 text-slate-500">Nenhum dashboard encontrado</p>
    <button type="button" data-action="open-add-modal"
            class="mt-3 inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white hover:opacity-90"
            style="background-color: #0F172A;">
        Adicionar Primeiro Dashboard
    </button>
</div>
{% endif %}
