<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recusar Plano de Ação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .card-custom { max-width: 500px; width: 90%; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); border-radius: 12px; border: none; }
        .icon-header { font-size: 4rem; color: #ef4444; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="card card-custom p-4 text-center">
            <i class="fas fa-times-circle icon-header"></i>
            <h4 class="fw-bold mb-2">Recusar Plano de Ação</h4>
            <p class="text-muted mb-4">Você está prestes a recusar a tratativa para a falha em:<br><strong class="text-dark" style="font-size: 1.1rem;">{{ plano.item_em_falta }}</strong><br><small>CR: {{ plano.cr_colaborador }}</small></p>
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-warning p-2 fw-bold">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    <label class="form-label fw-bold text-dark">Justificativa da Recusa <span class="text-danger">*</span></label>
                    <textarea name="justificativa" class="form-control bg-light" rows="4" placeholder="Explique o motivo da recusa (Ex: Item não precisa ser comprado, já temos no estoque da base...)" required></textarea>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <a href="{% url 'gestao_a_vista:torre_controle' %}" class="btn btn-outline-secondary px-4 fw-bold">Voltar / Cancelar</a>
                    <button type="submit" class="btn btn-danger px-4 fw-bold"><i class="fas fa-ban"></i> Confirmar Recusa</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
